<body>

<div class="container">

<div class="notice">

<h1>
英検1級 実践スピーキング Ultimate AI
</h1>

<h3>

</h3>

<select id="scene"
onchange="loadConversation()">

</h3>

準2〜2級
</option>

準1級
</option>

<option value="hard">
1級
</option>

</select>

会話
</h3>

<br>

<button class="listen-btn"
onclick="speakConversation()">
会話を聞く
</button>

<button class="record-btn"

英語で話して採点

</button>

</button>

onclick="loadConversation()">

</button>

<div class="result-box">

</div>

0%
</div>

id="status">
待機中
</div>

</h3>

</h3>

<div id="nativeFeedback">
ここに表示されます
</div>

</div>

<h3>
AI会話フィードバック
</h3>

ここに表示されます
</div>

</div>

<script>

const emotions = [

"Honestly",
"Personally",
"To be frank",
"Surprisingly",
"Unfortunately",
"Lately",
"These days",
"In my opinion",
"From my perspective"

];

const connectors = [

"because",
"since",
"even though",
"while",
"especially when",
"as",
"due to the fact that"

];

const openings = [

"A lot of people have been discussing",
"The media has recently focused on",
"Experts are becoming concerned about",
"Many employees are frustrated with",
"Society is struggling with",
"People are paying more attention to"

];

const consequences = [

"which could become a serious problem.",
"and the situation is getting worse.",
"so immediate action may be necessary.",
"which is affecting many people's lives.",
"and nobody seems to have a clear solution.",
"which may negatively impact future generations."

];

const advancedSubjects = [

"climate change policies",
"artificial intelligence regulation",
"economic inequality",
"aging populations",
"cybersecurity threats",
"mental health awareness",
"renewable energy",
"social media addiction",
"declining birth rates",
"global inflation",
"fake news on social media",
"urban overcrowding",
"food security",
"rising healthcare costs",
"privacy concerns",
"automation in the workplace",
"international conflicts",
"youth unemployment"

];

const sceneData = {

office:{
subjects:advancedSubjects,
replies:[
"That's been causing a lot of stress lately.",
"It's becoming a serious issue.",
"I've been worried about it all week.",
"Management is discussing possible solutions."
],
questions:[
"どう思う？",
"何か対策はある？",
"かなり大変そうだね。"
]
},

classroom:{
subjects:advancedSubjects,
replies:[
"It was harder than I expected.",
"I'm struggling to keep up.",
"I need more time to prepare.",
"The professor's expectations are really high."
],
questions:[
"どこが難しいの？",
"先生に相談した？",
"何か助けが必要？"
]
},

meeting:{
subjects:advancedSubjects,
replies:[
"The current approach isn't working.",
"We need a better solution.",
"Management is very concerned about it.",
"We should discuss alternative strategies."
],
questions:[
"別の案はありますか？",
"リスクはありますか？",
"長期的にはどうでしょう？"
]
},

train:{
subjects:advancedSubjects,
replies:[
"It's getting worse every year.",
"People are really frustrated.",
"The government should address it.",
"Commuting has become exhausting lately."
],
questions:[
"原因は何だと思う？",
"改善できると思う？",
"かなり不便だよね。"
]
}

};

let recognition = null;
let isRecognizing = false;

function generateAnswers(japanese){

const patterns = {

"どう思う？":[
"What do you think?",
"How do you feel about it?",
"What's your opinion?"
],

"何か対策はある？":[
"Do you have any solutions in mind?",
"Is there anything we can do?",
"What measures should we take?"
],

"かなり大変そうだね。":[
"That sounds really difficult.",
"It seems quite challenging.",
"That must be tough."
],

"どこが難しいの？":[
"Which part is difficult?",
"What are you struggling with?",
"What seems challenging?"
],

"先生に相談した？":[
"Have you talked to the professor?",
"Did you ask your teacher for help?",
"Have you consulted your instructor?"
],

"何か助けが必要？":[
"Do you need any help?",
"Is there anything I can do for you?",
"Would you like some assistance?"
],

"別の案はありますか？":[
"Do you have any alternative ideas?",
"Can we consider another option?",
"Is there a different approach?"
],

"リスクはありますか？":[
"Are there any risks involved?",
"Could this create additional problems?",
"What are the possible risks?"
],

"長期的にはどうでしょう？":[
"How about in the long term?",
"Will this work in the future?",
"Is this sustainable long-term?"
],

"原因は何だと思う？":[
"What do you think is causing it?",
"What do you think the reason is?",
"Why do you think this is happening?"
],

"改善できると思う？":[
"Do you think it can improve?",
"Will things get better?",
"Do you think the situation will improve?"
],

"かなり不便だよね。":[
"That's really inconvenient.",
"It must be very frustrating.",
"That sounds extremely inconvenient."
]

};

return patterns[japanese];

}

function generateDynamicAnswers(subject){

const starters = [

"I think",
"Personally, I believe",
"In my opinion",
"From my perspective",
"It seems to me that"

];

const reasons = [

"the government should take action",
"people need to become more aware",
"companies should improve their policies",
"education plays an important role",
"international cooperation is necessary",
"society needs long-term solutions"

];

const endings = [

"before the problem becomes worse.",
"for future generations.",
"as soon as possible.",
"to improve the current situation.",
"to create a more sustainable society."

];

let answers = [];

for(let i=0;i<3;i++){

const s =
starters[Math.floor(Math.random()*starters.length)];

const r =
reasons[Math.floor(Math.random()*reasons.length)];

const e =
endings[Math.floor(Math.random()*endings.length)];

answers.push(
`${s} regarding ${subject}, ${r} ${e}`
);

}

return answers;

}

function generateConversation(scene){

const data = sceneData[scene];

const subject =
data.subjects[
Math.floor(Math.random()*data.subjects.length)
];

const emotion =
emotions[
Math.floor(Math.random()*emotions.length)
];

const opening =
openings[
Math.floor(Math.random()*openings.length)
];

const connector =
connectors[
Math.floor(Math.random()*connectors.length)
];

const consequence =
consequences[
Math.floor(Math.random()*consequences.length)
];

let reply =
data.replies[
Math.floor(Math.random()*data.replies.length)
];

const jp =
data.questions[
Math.floor(Math.random()*data.questions.length)
];

const sentenceA =

`${emotion}, ${opening} ${subject} ${connector} many experts believe that it could significantly affect society in the near future.`;

let sentenceB =

`${reply} ${consequence}`;

if(Math.random() > 0.5){

sentenceB +=
" Many people are starting to feel anxious about the future.";

}else{

sentenceB +=
" Some experts believe immediate action is necessary.";

}

return {

a:sentenceA,
b:sentenceB,
cJapanese:jp,
answers:generateDynamicAnswers(subject)

};

}

function loadConversation(){

const scene =
document.getElementById("scene").value;

const convo =
generateConversation(scene);

window.currentConversation =
convo;

document.getElementById("text").value =

`A:
${convo.a}

B:
${convo.b}

C:
${convo.cJapanese}`;

resetDisplay();

}

function nextConversation(){

loadConversation();

}

function resetDisplay(){

document.getElementById("result")
.innerHTML =
"まだ録音されていません";

document.getElementById("score")
.innerText =
"0%";

document.getElementById("feedbackText")
.innerHTML =
"ここに表示されます";

document.getElementById("nativeFeedback")
.innerHTML =
"ここに表示されます";

document.getElementById("aiFeedback")
.innerHTML =
"ここに表示されます";

document.getElementById("status")
.innerText =
"待機中";

}

function speakConversation(){

speechSynthesis.cancel();

const text =
document.getElementById("text").value;

const utterance =
new SpeechSynthesisUtterance(text);

utterance.lang = "en-US";

const level =
document.getElementById("level").value;

if(level==="easy"){
utterance.rate = 0.8;
}

if(level==="medium"){
utterance.rate = 0.95;
}

if(level==="hard"){
utterance.rate = 1.1;
}

speechSynthesis.speak(utterance);

}

function startShadowing(){

speakConversation();

setTimeout(()=>{

startRecognition();

},3000);

}

function normalizeEnglish(text){

text = text.toLowerCase();

const patterns = [

[/want to/g,"wanna"],
[/going to/g,"gonna"],
[/got to/g,"gotta"],
[/have to/g,"hafta"],
[/did you/g,"didja"],
[/could you/g,"couldja"],
[/would you/g,"wouldja"],
[/water/g,"wadder"],
[/better/g,"bedder"],
[/kind of/g,"kinda"],
[/out of/g,"outta"],
[/i don't know/g,"dunno"],
[/ing\b/g,"in"],
[/let me/g,"lemme"],
[/give me/g,"gimme"],
[/want you to/g,"wantcha"],
[/what are you/g,"whatcha"],
[/have got to/g,"hafta"],
[/trying to/g,"tryna"],
[/used to/g,"usta"],
[/should have/g,"shoulda"],
[/could have/g,"coulda"],
[/would have/g,"woulda"],
[/sort of/g,"sorta"],
[/a lot of/g,"alotta"]

];

patterns.forEach(p=>{

text =
text.replace(p[0],p[1]);

});

text =
text.replace(/[.,!?]/g,"");

text =
text.replace(/\s+/g," ").trim();

return text;

}

function levenshtein(a,b){

const matrix=[];

for(let i=0;i<=b.length;i++){
matrix[i]=[i];
}

for(let j=0;j<=a.length;j++){
matrix[0][j]=j;
}

for(let i=1;i<=b.length;i++){

for(let j=1;j<=a.length;j++){

if(
b.charAt(i-1) ===
a.charAt(j-1)
){

matrix[i][j] =
matrix[i-1][j-1];

}else{

matrix[i][j] =
Math.min(
matrix[i-1][j-1]+1,
matrix[i][j-1]+1,
matrix[i-1][j]+1
);

}

}

}

return matrix[b.length][a.length];

}

function calculateSimilarity(
original,
spoken
){

original =
normalizeEnglish(original);

spoken =
normalizeEnglish(spoken);

const distance =
levenshtein(original,spoken);

const maxLength =
Math.max(
original.length,
spoken.length
);

let similarity =
Math.round(
(1-distance/maxLength)*100
);

similarity += 18;

if(similarity > 100){
similarity = 100;
}

if(similarity < 0){
similarity = 0;
}

return similarity;

}

function getBestScore(
answers,
spoken
){

let best = 0;
let bestAnswer = "";

answers.forEach(answer=>{

const score =
calculateSimilarity(
answer,
spoken
);

if(score > best){

best = score;
bestAnswer = answer;

}

});

return {
score:best,
answer:bestAnswer
};

}

function generateFeedback(spoken){

spoken = spoken.toLowerCase();

let tips = [];

if(spoken.includes("r")){

tips.push(
"✅ R音が比較的自然です"
);

}else{

tips.push(
"⚠ R音が弱い可能性があります"
);

}

if(spoken.includes("th")){

tips.push(
"✅ TH音が意識されています"
);

}else{

tips.push(
"⚠ TH音をもう少し意識しましょう"
);

}

if(
spoken.includes("wanna") ||
spoken.includes("gonna")
){

tips.push(
"✅ ネイティブ特有の短縮が自然です"
);

}

tips.push(
"🔹 強弱リズムを意識するとさらに自然になります"
);

tips.push(
"🔹 単語同士を滑らかにつなげましょう"
);

return tips.join("<br><br>");

}

function generateNativeFeedback(spoken){

spoken =
spoken.toLowerCase();

let result = [];

if(spoken.includes("wanna")){
result.push(
"✅ want to → wanna のリンキングが自然です"
);
}

if(spoken.includes("gonna")){
result.push(
"✅ going to → gonna の短縮が自然です"
);
}

if(spoken.includes("didja")){
result.push(
"✅ did you → didja の同化が自然です"
);
}

if(
spoken.includes("wadder") ||
spoken.includes("bedder")
){
result.push(
"✅ Flap T が自然です"
);
}

if(spoken.includes("dunno")){
result.push(
"✅ dunno の省略が自然です"
);
}

if(result.length === 0){

result.push(
"⚠ もっと単語をつなげると自然になります"
);

result.push(
"⚠ リンキングを意識しましょう"
);

}

return result.join("<br><br>");

}

function generateAIComment(score){

if(score >= 90){

return `

非常に自然な英語です。<br><br>

英検1級・IELTS高得点レベルです。

`;

}

if(score >= 75){

return `

かなり自然です。<br><br>

さらにリズム感を意識すると、
よりネイティブらしくなります。

`;

}

return `

理由・具体例・結論を
意識するとさらに良くなります。

`;

}

function processSpeechResult(spoken){

const convo =
window.currentConversation;

const best =
getBestScore(
convo.answers,
spoken
);

document.getElementById("result")
.innerHTML =

`
<div class="point">

<b>あなた：</b>

<br>

${spoken}

</div>

<div class="point">

<b>模範解答①：</b>

<br>

${convo.answers[0]}

</div>

<div class="point">

<b>模範解答②：</b>

<br>

${convo.answers[1]}

</div>

<div class="point">

<b>模範解答③：</b>

<br>

${convo.answers[2]}

</div>

`;

document.getElementById("score")
.innerText =
best.score + "%";

document.getElementById("feedbackText")
.innerHTML =
generateFeedback(spoken);

document.getElementById("nativeFeedback")
.innerHTML =
generateNativeFeedback(spoken);

document.getElementById("aiFeedback")
.innerHTML =
generateAIComment(best.score);

if(best.score >= 85){

document.getElementById("status")
.innerText =
"Excellent!";

}else{

document.getElementById("status")
.innerText =
"もう一度挑戦してみましょう";

}

}

function startRecognition(){

if(isRecognizing){
return;
}

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!SpeechRecognition){

alert(
"このブラウザは音声認識に未対応です"
);

return;

}

recognition =
new SpeechRecognition();

isRecognizing = true;

const button =
document.querySelector(".record-btn");

button.disabled = true;

document.getElementById("status")
.innerText =
"音声認識中...";

recognition.lang = "en-US";

recognition.interimResults = false;

recognition.continuous = false;

recognition.maxAlternatives = 1;

recognition.onresult = function(event){

const spoken =
event.results[0][0].transcript;

processSpeechResult(spoken);

};

recognition.onerror = function(event){

document.getElementById("status")
.innerText =
"認識エラー: " + event.error;

isRecognizing = false;

button.disabled = false;

};

recognition.onend = function(){

isRecognizing = false;

button.disabled = false;

recognition = null;

if(
document.getElementById("status")
.innerText ===
"音声認識中..."
){

document.getElementById("status")
.innerText =
"待機中";

}

};

recognition.start();

}

loadConversation();

</script>
