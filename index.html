}

<body>

<div class="container">

<div class="notice">

⚠ iPhone/iPadでは Safari最新版推奨。<br>
初回はマイク許可が必要です。<br>
GitHub Pages の https:// URL で開いてください。

</div>

<h1>
英検1級 実践スピーキング Ultimate
</h1>

<div class="mode-box">

<h3>
場面設定
</h3>

<select id="scene"
onchange="changeScene()">

<option value="office">職場</option>
<option value="classroom">教室</option>
<option value="meeting">会議室</option>
<option value="train">電車</option>
<option value="airport">空港</option>
<option value="cafe">カフェ</option>
<option value="hospital">病院</option>
<option value="restaurant">レストラン</option>
<option value="jobInterview">就職面接</option>
<option value="internationalParty">国際交流</option>
<option value="onlineMeeting">オンライン会議</option>
<option value="familyDiscussion">家族会議</option>
<option value="travelTrouble">旅行トラブル</option>
<option value="bank">銀行</option>

</select>

<h3>
会話モード
</h3>

<select id="mode"
onchange="loadConversation()">

<option value="normal">
通常会話
</option>

<option value="discussion">
社会問題ディスカッション
</option>

<option value="roleplay">
ロールプレイ
</option>

</select>

<h3>
感情モード
</h3>

<select id="emotion">

<option value="normal">通常</option>
<option value="formal">フォーマル</option>
<option value="casual">カジュアル</option>
<option value="nervous">緊張</option>
<option value="happy">嬉しい</option>
<option value="angry">怒っている</option>

</select>

<h3>
音声速度
</h3>

<select id="speed">

<option value="0.8">0.8x</option>
<option value="0.9" selected>0.9x</option>
<option value="1.0">1.0x</option>
<option value="1.1">1.1x</option>

</select>

</div>

<h3>
会話
</h3>

<textarea id="text"></textarea>

<br>

<button class="listen-btn"
onclick="speakConversation()">
会話を聞く
</button>

<button class="record-btn"
onclick="startRecognition()">
英語で話して採点
</button>

<button class="shadow-btn"
onclick="startShadowing()">
シャドーイング
</button>

<button class="next-btn"
onclick="nextConversation()">
次へ
</button>

<button class="random-btn"
onclick="loadRandomConversation()">
ランダム問題
</button>

<div class="result-box">

<h3>
認識結果
</h3>

<div id="result">
まだ録音されていません
</div>

<h3>
一致率
</h3>

<div class="score"
id="score">
0%
</div>

<div class="status"
id="status">
待機中
</div>

</div>

<div class="feedback">

<h3>
発音アドバイス
</h3>

<div id="feedbackText">
ここに表示されます
</div>

</div>

<div class="native-box">

<h3>
ネイティブ音声変化解析
</h3>

<div id="nativeFeedback">
ここに表示されます
</div>

</div>

<div class="ai-box">

<h3>
AI会話フィードバック
</h3>

<div id="aiFeedback">
ここに表示されます
</div>

</div>

</div>

<script>

const scenarios = {

office:[

{
a:"You look exhausted today, Mika.",
b:"Yeah, I stayed up late preparing for tomorrow's presentation.",
cJapanese:"そんなにプレッシャーが大きいの？",
answers:[
"Is the pressure really that intense?",
"Is it really that stressful?",
"Are you under that much pressure?"
]
}

],

classroom:[

{
a:"Did you finish the assignment for Professor Brown?",
b:"Not yet. The topic was more difficult than I expected.",
cJapanese:"どの部分が特に難しかったの？",
answers:[
"Which part was especially difficult?",
"What part did you struggle with most?",
"Which section was the hardest?"
]
}

],

meeting:[

{
a:"We need a new strategy to attract younger customers.",
b:"Social media marketing might help increase visibility.",
cJapanese:"でも、それだけでは不十分かもしれない。",
answers:[
"However, that alone may not be enough.",
"But that alone might not solve the issue.",
"Still, that may not be sufficient."
]
}

],

train:[

{
a:"The train delays have been terrible lately.",
b:"Apparently there was another accident this morning.",
cJapanese:"最近インフラの老朽化が問題になっているよね。",
answers:[
"Recently, aging infrastructure has become a serious issue.",
"Infrastructure deterioration has become a major problem lately.",
"Aging infrastructure is becoming a serious concern."
]
}

]

};

const discussionTopics = [

{
topic:"Climate Change",
question:
"What should governments do to address climate change?"
},

{
topic:"Artificial Intelligence",
question:
"Do you think AI will improve society overall?"
},

{
topic:"Education",
question:
"Should university education be free?"
}

];

const roleplayTopics = [

{
situation:
"You are negotiating salary with your employer."
},

{
situation:
"You are discussing education reform with a professor."
}

];

let currentScene = "office";
let currentIndex = 0;

let recognition = null;
let isRecognizing = false;

function getConversations(){

  return scenarios[currentScene];
}

function changeScene(){

  currentScene =
    document.getElementById("scene").value;

  currentIndex = 0;

  loadConversation();
}

function nextConversation(){

  currentIndex++;

  if(
    currentIndex >=
    getConversations().length
  ){
    currentIndex = 0;
  }

  loadConversation();
}

function loadRandomConversation(){

  const keys =
    Object.keys(scenarios);

  currentScene =
    keys[
      Math.floor(
        Math.random()*keys.length
      )
    ];

  document.getElementById("scene").value =
    currentScene;

  currentIndex = 0;

  loadConversation();
}

function loadConversation(){

  const mode =
    document.getElementById("mode").value;

  if(mode === "discussion"){

    const topic =
      discussionTopics[
        Math.floor(
          Math.random() *
          discussionTopics.length
        )
      ];

    document.getElementById("text").value =

`Discussion Topic:

${topic.topic}

Question:

${topic.question}

自由に英語で答えてください`;

    return;
  }

  if(mode === "roleplay"){

    const role =
      roleplayTopics[
        Math.floor(
          Math.random() *
          roleplayTopics.length
        )
      ];

    document.getElementById("text").value =

`Roleplay Situation:

${role.situation}

自由に英語で会話してください`;

    return;
  }

  const convo =
    getConversations()[currentIndex];

  document.getElementById("text").value =

`A:
${convo.a}

B:
${convo.b}

C:
${convo.cJapanese}`;

  resetDisplay();
}

function resetDisplay(){

  document.getElementById("result")
  .innerHTML =
    "まだ録音されていません";

  document.getElementById("score")
  .innerText =
    "0%";

  document.getElementById("feedbackText")
  .innerHTML =
    "ここに表示されます";

  document.getElementById("nativeFeedback")
  .innerHTML =
    "ここに表示されます";

  document.getElementById("aiFeedback")
  .innerHTML =
    "ここに表示されます";

  document.getElementById("status")
  .innerText =
    "待機中";
}

function speakConversation(){

  speechSynthesis.cancel();

  const text =
    document.getElementById("text").value;

  const utterance =
    new SpeechSynthesisUtterance(text);

  utterance.lang = "en-US";

  utterance.rate =
    parseFloat(
      document.getElementById("speed").value
    );

  const emotion =
    document.getElementById("emotion").value;

  if(emotion === "formal"){
    utterance.pitch = 0.9;
  }

  if(emotion === "casual"){
    utterance.pitch = 1.1;
  }

  if(emotion === "happy"){
    utterance.pitch = 1.2;
  }

  if(emotion === "angry"){
    utterance.pitch = 0.7;
  }

  speechSynthesis.speak(utterance);
}

function startShadowing(){

  speakConversation();

  setTimeout(()=>{

    startRecognition();

  },3000);
}

function normalizeEnglish(text){

  text = text.toLowerCase();

  const patterns = [

    /*
    =====================================
    基本リンキング
    =====================================
    */

    [/want to/g,"wanna"],
    [/going to/g,"gonna"],
    [/got to/g,"gotta"],
    [/have to/g,"hafta"],
    [/has to/g,"hasta"],
    [/used to/g,"usta"],

    /*
    =====================================
    同化
    =====================================
    */

    [/did you/g,"didja"],
    [/could you/g,"couldja"],
    [/would you/g,"wouldja"],
    [/meet you/g,"meechu"],
    [/let you/g,"letchu"],
    [/don't you/g,"doncha"],

    /*
    =====================================
    フラップT
    =====================================
    */

    [/water/g,"wadder"],
    [/better/g,"bedder"],
    [/get up/g,"gedup"],
    [/shut up/g,"shudup"],
    [/a lot of/g,"alotta"],

    /*
    =====================================
    リダクション
    =====================================
    */

    [/i don't know/g,"dunno"],
    [/good night/g,"goodnite"],
    [/next week/g,"nexweek"],

    /*
    =====================================
    弱化
    =====================================
    */

    [/tell him/g,"tellim"],
    [/give him/g,"givim"],
    [/cup of/g,"cuppa"],
    [/kind of/g,"kinda"],
    [/sort of/g,"sorta"],
    [/out of/g,"outta"],

    /*
    =====================================
    その他
    =====================================
    */

    [/them/g,"em"],
    [/and/g,"n"],
    [/ing\b/g,"in"]

  ];

  patterns.forEach(p=>{

    text =
      text.replace(p[0],p[1]);

  });

  text =
    text.replace(/[.,!?]/g,"");

  text =
    text.replace(/\s+/g," ").trim();

  return text;
}

function levenshtein(a,b){

  const matrix=[];

  for(let i=0;i<=b.length;i++){
    matrix[i]=[i];
  }

  for(let j=0;j<=a.length;j++){
    matrix[0][j]=j;
  }

  for(let i=1;i<=b.length;i++){

    for(let j=1;j<=a.length;j++){

      if(
        b.charAt(i-1) ===
        a.charAt(j-1)
      ){

        matrix[i][j] =
          matrix[i-1][j-1];

      }else{

        matrix[i][j] =
          Math.min(
            matrix[i-1][j-1]+1,
            matrix[i][j-1]+1,
            matrix[i-1][j]+1
          );
      }
    }
  }

  return matrix[b.length][a.length];
}

function calculateSimilarity(
  original,
  spoken
){

  original =
    normalizeEnglish(original);

  spoken =
    normalizeEnglish(spoken);

  const distance =
    levenshtein(original,spoken);

  const maxLength =
    Math.max(
      original.length,
      spoken.length
    );

  let similarity =
    Math.round(
      (1-distance/maxLength)*100
    );

  similarity += 12;

  if(similarity > 100){
    similarity = 100;
  }

  if(similarity < 0){
    similarity = 0;
  }

  return similarity;
}

function getBestScore(
  answers,
  spoken
){

  let best = 0;
  let bestAnswer = "";

  answers.forEach(answer=>{

    const score =
      calculateSimilarity(
        answer,
        spoken
      );

    if(score > best){

      best = score;
      bestAnswer = answer;
    }

  });

  return {
    score:best,
    answer:bestAnswer
  };
}

function evaluateFreeSpeech(text){

  let score = 60;

  if(text.length > 40){
    score += 10;
  }

  if(
    text.includes("because") ||
    text.includes("however")
  ){
    score += 10;
  }

  if(score > 100){
    score = 100;
  }

  return score;
}

function generateFeedback(){

  return `

🔹 TH音は舌先を軽く前歯に当てましょう。<br><br>

🔹 R音は口の奥で響かせると自然になります。<br><br>

🔹 英語特有の強弱リズムを意識しましょう。<br><br>

🔹 単語同士を滑らかにつなげましょう。

`;
}

function generateNativeFeedback(spoken){

  spoken =
    spoken.toLowerCase();

  let result = [];

  if(
    spoken.includes("wanna")
  ){

    result.push(
      "✅ want to → wanna のリンキングが自然です"
    );
  }

  if(
    spoken.includes("gonna")
  ){

    result.push(
      "✅ going to → gonna の短縮が自然です"
    );
  }

  if(
    spoken.includes("didja")
  ){

    result.push(
      "✅ did you → didja の同化ができています"
    );
  }

  if(
    spoken.includes("couldja")
  ){

    result.push(
      "✅ could you → couldja の音声変化が自然です"
    );
  }

  if(
    spoken.includes("wadder") ||
    spoken.includes("bedder")
  ){

    result.push(
      "✅ Flap T が自然です"
    );
  }

  if(
    spoken.includes("dunno")
  ){

    result.push(
      "✅ I don't know → dunno の省略が自然です"
    );
  }

  if(
    spoken.includes("kinda") ||
    spoken.includes("outta")
  ){

    result.push(
      "✅ 弱化表現が自然に使えています"
    );
  }

  if(result.length === 0){

    result.push(
      "⚠ 単語同士をもっと滑らかにつなげると自然になります"
    );

    result.push(
      "⚠ T/D/Y の連結音を意識しましょう"
    );
  }

  return result.join("<br><br>");
}

function generateAIComment(score){

  if(score >= 90){

    return `

非常に自然な英語です。<br><br>

英検1級・IELTS高得点レベルです。

`;
  }

  if(score >= 75){

    return `

かなり良い英語です。<br><br>

さらに滑らかさを意識すると、
よりネイティブらしくなります。

`;
  }

  return `

理由・具体例・結論を
意識するとさらに良くなります。

`;
}

function processSpeechResult(spoken){

  const mode =
    document.getElementById("mode").value;

  if(
    mode === "discussion" ||
    mode === "roleplay"
  ){

    const freeScore =
      evaluateFreeSpeech(spoken);

    document.getElementById("result")
    .innerHTML =

`
<div class="point">

<b>あなた：</b>

<br>

${spoken}

</div>
`;

    document.getElementById("score")
    .innerText =
      freeScore + "%";

    document.getElementById("feedbackText")
    .innerHTML =
      generateFeedback();

    document.getElementById("nativeFeedback")
    .innerHTML =
      generateNativeFeedback(spoken);

    document.getElementById("aiFeedback")
    .innerHTML =

`
論理展開は良好です。<br><br>

さらに：
<ul>
<li>理由</li>
<li>具体例</li>
<li>結論</li>
</ul>

を加えると、
英検1級らしくなります。
`;

    return;
  }

  const convo =
    getConversations()[currentIndex];

  const best =
    getBestScore(
      convo.answers,
      spoken
    );

  document.getElementById("result")
  .innerHTML =

`
<div class="point">

<b>あなた：</b>

<br>

${spoken}

</div>

<div class="point">

<b>模範解答：</b>

<br>

${best.answer}

</div>
`;

  document.getElementById("score")
  .innerText =
    best.score + "%";

  document.getElementById("feedbackText")
  .innerHTML =
    generateFeedback();

  document.getElementById("nativeFeedback")
  .innerHTML =
    generateNativeFeedback(spoken);

  document.getElementById("aiFeedback")
  .innerHTML =
    generateAIComment(best.score);

  if(best.score >= 85){

    document.getElementById("status")
    .innerText =
      "Excellent!";

  }else{

    document.getElementById("status")
    .innerText =
      "もう一度挑戦してみましょう";
  }
}

function startRecognition(){

  if(isRecognizing){
    return;
  }

  const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

  if(!SpeechRecognition){

    alert(
      "このブラウザは音声認識に未対応です。\nSafari最新版を使用してください。"
    );

    return;
  }

  try{

    recognition =
      new SpeechRecognition();

  }catch(e){

    console.log(e);

    alert(
      "音声認識の初期化に失敗しました。"
    );

    return;
  }

  isRecognizing = true;

  const button =
    document.querySelector(".record-btn");

  button.disabled = true;

  document.getElementById("status")
  .innerText =
    "音声認識中...";

  recognition.lang = "en-US";

  recognition.interimResults = false;

  recognition.continuous = false;

  recognition.maxAlternatives = 1;

  recognition.onresult = function(event){

    try{

      const spoken =
        event.results[0][0].transcript;

      processSpeechResult(spoken);

    }catch(e){

      console.log(e);

      document.getElementById("status")
      .innerText =
        "解析エラー";
    }
  };

  recognition.onerror = function(event){

    let message = "";

    switch(event.error){

      case "not-allowed":
        message =
          "マイク権限が拒否されています";
        break;

      case "no-speech":
        message =
          "音声が検出されませんでした";
        break;

      case "audio-capture":
        message =
          "マイクが見つかりません";
        break;

      case "network":
        message =
          "ネットワークエラー";
        break;

      default:
        message =
          "認識エラー: " + event.error;
    }

    document.getElementById("status")
    .innerText =
      message;

    isRecognizing = false;

    button.disabled = false;
  };

  recognition.onend = function(){

    isRecognizing = false;

    button.disabled = false;

    recognition = null;

    if(
      document.getElementById("status")
      .innerText ===
      "音声認識中..."
    ){

      document.getElementById("status")
      .innerText =
        "待機中";
    }
  };

  try{

    recognition.start();

  }catch(e){

    document.getElementById("status")
    .innerText =
      "起動エラー";

    isRecognizing = false;

    button.disabled = false;
  }
}

loadConversation();

</script>

</body>
