onchange="loadConversation()">

<option value="office">職場</option>

<br>

onclick="speakConversation()">
会話を聞く
</button>

</button>

</button>

0%
</div>

<script>

const sceneData = {

office:{

subjects:[
"the presentation",
"the deadline",
"staff shortages",
"remote work",
"the client meeting",
"work-life balance"
],

replies:[
"That's been causing a lot of stress lately.",
"It's becoming a serious issue.",
"I've been worried about it all week.",
"Management is discussing possible solutions."
],

questions:[
"どう思う？",
"何か対策はある？",
"かなり大変そうだね。"
]

},

classroom:{

subjects:[
"the assignment",
"the final exam",
"group discussions",
"online classes",
"research projects"
],

replies:[
"It was harder than I expected.",
"I'm struggling to keep up.",
"I need more time to prepare.",
"The professor's expectations are really high."
],

questions:[
"どこが難しいの？",
"先生に相談した？",
"何か助けが必要？"
]

},

meeting:{

subjects:[
"sales performance",
"marketing strategy",
"budget cuts",
"AI adoption",
"customer feedback"
],

replies:[
"The current approach isn't working.",
"We need a better solution.",
"Management is very concerned about it.",
"We should discuss alternative strategies."
],

questions:[
"別の案はありますか？",
"リスクはありますか？",
"長期的にはどうでしょう？"
]

},

train:{

subjects:[
"train delays",
"crowded stations",
"commuting stress",
"infrastructure problems",
"ticket prices"
],

replies:[
"It's getting worse every year.",
"People are really frustrated.",
"The government should address it.",
"Commuting has become exhausting lately."
],

questions:[
"原因は何だと思う？",
"改善できると思う？",
"かなり不便だよね。"
]

}

};

let recognition = null;
let isRecognizing = false;

function generateAnswers(japanese){

  const patterns = {

"どう思う？":[
"What do you think?",
"How do you feel about it?",
"What's your opinion?"
],

"何か対策はある？":[
"Do you have any solutions in mind?",
"Is there anything we can do?",
"What measures should we take?"
],

"かなり大変そうだね。":[
"That sounds really difficult.",
"It seems quite challenging.",
"That must be tough."
],

"どこが難しいの？":[
"Which part is difficult?",
"What are you struggling with?",
"What seems challenging?"
],

"先生に相談した？":[
"Have you talked to the professor?",
"Did you ask your teacher for help?",
"Have you consulted your instructor?"
],

"何か助けが必要？":[
"Do you need any help?",
"Is there anything I can do for you?",
"Would you like some assistance?"
],

"別の案はありますか？":[
"Do you have any alternative ideas?",
"Can we consider another option?",
"Is there a different approach?"
],

"リスクはありますか？":[
"Are there any risks involved?",
"Could this create additional problems?",
"What are the possible risks?"
],

"長期的にはどうでしょう？":[
"How about in the long term?",
"Will this work in the future?",
"Is this sustainable long-term?"
],

"原因は何だと思う？":[
"What do you think is causing it?",
"What do you think the reason is?",
"Why do you think this is happening?"
],

"改善できると思う？":[
"Do you think it can improve?",
"Will things get better?",
"Do you think the situation will improve?"
],

"かなり不便だよね。":[
"That's really inconvenient.",
"It must be very frustrating.",
"That sounds extremely inconvenient."
]

  };

  return patterns[japanese];
}

function generateConversation(scene){

  const data = sceneData[scene];

  const subject =
    data.subjects[
      Math.floor(Math.random()*data.subjects.length)
    ];

  const reply =
    data.replies[
      Math.floor(Math.random()*data.replies.length)
    ];

  const jp =
    data.questions[
      Math.floor(Math.random()*data.questions.length)
    ];

  const templates = [

{
a:`Have you heard about ${subject}?`,
b:reply
},

{
a:`People keep talking about ${subject} lately.`,
b:reply
},

{
a:`What do you think about ${subject}?`,
b:reply
},

{
a:`Everyone at work seems worried about ${subject}.`,
b:reply
}

];

  const selected =
    templates[
      Math.floor(Math.random()*templates.length)
    ];

  return {
    a:selected.a,
    b:reply,
    cJapanese:jp,
    answers:generateAnswers(jp)
  };
}

function loadConversation(){

  const scene =
    document.getElementById("scene").value;

  const convo =
    generateConversation(scene);

  window.currentConversation =
    convo;

  document.getElementById("text").value =

`A:
${convo.a}

B:
${convo.b}

C:
${convo.cJapanese}`;

  resetDisplay();
}

function nextConversation(){

  loadConversation();
}

function resetDisplay(){

  document.getElementById("result")
  .innerHTML =
    "まだ録音されていません";

  document.getElementById("score")
  .innerText =
    "0%";

  document.getElementById("feedbackText")
  .innerHTML =
    "ここに表示されます";

  document.getElementById("nativeFeedback")
  .innerHTML =
    "ここに表示されます";

  document.getElementById("aiFeedback")
  .innerHTML =
    "ここに表示されます";

  document.getElementById("status")
  .innerText =
    "待機中";
}

function speakConversation(){

  speechSynthesis.cancel();

  const text =
    document.getElementById("text").value;

  const utterance =
    new SpeechSynthesisUtterance(text);

  utterance.lang = "en-US";

  utterance.rate = 0.9;

  speechSynthesis.speak(utterance);
}

function startShadowing(){

  speakConversation();

  setTimeout(()=>{

    startRecognition();

  },3000);
}

function normalizeEnglish(text){

  text = text.toLowerCase();

  const patterns = [

    [/want to/g,"wanna"],
    [/going to/g,"gonna"],
    [/got to/g,"gotta"],
    [/have to/g,"hafta"],
    [/did you/g,"didja"],
    [/could you/g,"couldja"],
    [/would you/g,"wouldja"],
    [/water/g,"wadder"],
    [/better/g,"bedder"],
    [/kind of/g,"kinda"],
    [/out of/g,"outta"],
    [/i don't know/g,"dunno"],
    [/ing\b/g,"in"]

  ];

  patterns.forEach(p=>{

    text =
      text.replace(p[0],p[1]);

  });

  text =
    text.replace(/[.,!?]/g,"");

  text =
    text.replace(/\s+/g," ").trim();

  return text;
}

function levenshtein(a,b){

  const matrix=[];

  for(let i=0;i<=b.length;i++){
    matrix[i]=[i];
  }

  for(let j=0;j<=a.length;j++){
    matrix[0][j]=j;
  }

  for(let i=1;i<=b.length;i++){

    for(let j=1;j<=a.length;j++){

      if(
        b.charAt(i-1) ===
        a.charAt(j-1)
      ){

        matrix[i][j] =
          matrix[i-1][j-1];

      }else{

        matrix[i][j] =
          Math.min(
            matrix[i-1][j-1]+1,
            matrix[i][j-1]+1,
            matrix[i-1][j]+1
          );
      }
    }
  }

  return matrix[b.length][a.length];
}

function calculateSimilarity(
  original,
  spoken
){

  original =
    normalizeEnglish(original);

  spoken =
    normalizeEnglish(spoken);

  const distance =
    levenshtein(original,spoken);

  const maxLength =
    Math.max(
      original.length,
      spoken.length
    );

  let similarity =
    Math.round(
      (1-distance/maxLength)*100
    );

  similarity += 12;

  if(similarity > 100){
    similarity = 100;
  }

  if(similarity < 0){
    similarity = 0;
  }

  return similarity;
}

function getBestScore(
  answers,
  spoken
){

  let best = 0;
  let bestAnswer = "";

  answers.forEach(answer=>{

    const score =
      calculateSimilarity(
        answer,
        spoken
      );

    if(score > best){

      best = score;
      bestAnswer = answer;
    }

  });

  return {
    score:best,
    answer:bestAnswer
  };
}

function generateFeedback(){

  return `

🔹 TH音は舌先を軽く前歯に当てましょう。<br><br>

🔹 R音は口の奥で響かせると自然になります。<br><br>

🔹 強弱リズムを意識すると自然になります。<br><br>

🔹 単語同士を滑らかにつなげましょう。

`;
}

function generateNativeFeedback(spoken){

  spoken =
    spoken.toLowerCase();

  let result = [];

  if(spoken.includes("wanna")){
    result.push(
      "✅ want to → wanna のリンキングが自然です"
    );
  }

  if(spoken.includes("gonna")){
    result.push(
      "✅ going to → gonna の短縮が自然です"
    );
  }

  if(spoken.includes("didja")){
    result.push(
      "✅ did you → didja の同化が自然です"
    );
  }

  if(
    spoken.includes("wadder") ||
    spoken.includes("bedder")
  ){
    result.push(
      "✅ Flap T が自然です"
    );
  }

  if(spoken.includes("dunno")){
    result.push(
      "✅ dunno の省略が自然です"
    );
  }

  if(result.length === 0){

    result.push(
      "⚠ もっと単語をつなげると自然になります"
    );

    result.push(
      "⚠ リンキングを意識しましょう"
    );
  }

  return result.join("<br><br>");
}

function generateAIComment(score){

  if(score >= 90){

    return `

非常に自然な英語です。<br><br>

英検1級・IELTS高得点レベルです。

`;
  }

  if(score >= 75){

    return `

かなり自然です。<br><br>

さらにリズム感を意識すると、
よりネイティブらしくなります。

`;
  }

  return `

理由・具体例・結論を
意識するとさらに良くなります。

`;
}

function processSpeechResult(spoken){

  const convo =
    window.currentConversation;

  const best =
    getBestScore(
      convo.answers,
      spoken
    );

  document.getElementById("result")
  .innerHTML =

`
<div class="point">

<b>あなた：</b>

<br>

${spoken}

</div>

<div class="point">

<b>模範解答①：</b>

<br>

${convo.answers[0]}

</div>

<div class="point">

<b>模範解答②：</b>

<br>

${convo.answers[1]}

</div>

`;

  document.getElementById("score")
  .innerText =
    best.score + "%";

  document.getElementById("feedbackText")
  .innerHTML =
    generateFeedback();

  document.getElementById("nativeFeedback")
  .innerHTML =
    generateNativeFeedback(spoken);

  document.getElementById("aiFeedback")
  .innerHTML =
    generateAIComment(best.score);

  if(best.score >= 85){

    document.getElementById("status")
    .innerText =
      "Excellent!";

  }else{

    document.getElementById("status")
    .innerText =
      "もう一度挑戦してみましょう";
  }
}

function startRecognition(){

  if(isRecognizing){
    return;
  }

  const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

  if(!SpeechRecognition){

    alert(
      "このブラウザは音声認識に未対応です"
    );

    return;
  }

  recognition =
    new SpeechRecognition();

  isRecognizing = true;

  const button =
    document.querySelector(".record-btn");

  button.disabled = true;

  document.getElementById("status")
  .innerText =
    "音声認識中...";

  recognition.lang = "en-US";

  recognition.interimResults = false;

  recognition.continuous = false;

  recognition.maxAlternatives = 1;

  recognition.onresult = function(event){

    const spoken =
      event.results[0][0].transcript;

    processSpeechResult(spoken);
  };

  recognition.onerror = function(event){

    document.getElementById("status")
    .innerText =
      "認識エラー: " + event.error;

    isRecognizing = false;

    button.disabled = false;
  };

  recognition.onend = function(){

    isRecognizing = false;

    button.disabled = false;

    recognition = null;

    if(
      document.getElementById("status")
      .innerText ===
      "音声認識中..."
    ){

      document.getElementById("status")
      .innerText =
        "待機中";
    }
  };

  recognition.start();
}

loadConversation();

</script>
