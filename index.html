<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
英検1級 Ultimate AI Speaking
</title>

<style>

body{
  font-family:Arial,sans-serif;
  background:#f3f4f6;
  padding:20px;
}

.container{
  max-width:1100px;
  margin:auto;
  background:white;
  padding:24px;
  border-radius:16px;
}

textarea{
  width:100%;
  height:260px;
  font-size:18px;
  padding:14px;
  border-radius:10px;
  margin-top:10px;
}

button{
  margin-top:12px;
  margin-right:10px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

.listen-btn{
  background:#10b981;
  color:white;
}

.record-btn{
  background:#3b82f6;
  color:white;
}

.next-btn{
  background:#8b5cf6;
  color:white;
}

.score{
  font-size:56px;
  font-weight:bold;
}

.box{
  margin-top:20px;
  padding:16px;
  border-radius:10px;
  background:#f9fafb;
}

</style>

</head>

<body>

<div class="container">

<h1>
英検1級 Ultimate AI Speaking
</h1>

<select id="scene">

<option value="office">職場</option>
<option value="internationalParty">国際交流</option>
<option value="education">教育</option>
<option value="environment">環境問題</option>
<option value="technology">テクノロジー</option>
<option value="economy">経済</option>

</select>

<button class="next-btn"
onclick="loadConversation()">
AI問題生成
</button>

<textarea id="text"></textarea>

<br>

<button class="listen-btn"
onclick="speakConversation()">
会話を聞く
</button>

<button class="record-btn"
onclick="startRecognition()">
英語で話して採点
</button>

<div class="box">

<h3>
認識結果
</h3>

<div id="result">
まだ録音されていません
</div>

<h3>
一致率
</h3>

<div class="score"
id="score">
0%
</div>

<div id="status">
待機中
</div>

</div>

<div class="box">

<h3>
AIフィードバック
</h3>

<div id="feedback">
ここに表示されます
</div>

</div>

</div>

<script>

const API_URL =
"https://YOUR-WORKER.workers.dev";

let currentConversation = null;

let recognition = null;

let isRecognizing = false;

async function loadConversation(){

  const scene =
    document.getElementById("scene").value;

  document.getElementById("status")
  .innerText =
    "AI生成中...";

  try{

    const response =
      await fetch(API_URL,{

        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          scene:scene
        })

      });

    const convo =
      await response.json();

    currentConversation =
      convo;

    document.getElementById("text").value =

`A:
${convo.a}

B:
${convo.b}

C:
${convo.cJapanese}`;

    document.getElementById("status")
    .innerText =
      "生成完了";

  }catch(error){

    document.getElementById("status")
    .innerText =
      "生成失敗";

    console.log(error);
  }
}

function speakConversation(){

  speechSynthesis.cancel();

  const text =
    document.getElementById("text").value;

  const utterance =
    new SpeechSynthesisUtterance(text);

  utterance.lang = "en-US";

  utterance.rate = 0.9;

  speechSynthesis.speak(utterance);
}

function normalizeEnglish(text){

  return text
    .toLowerCase()
    .replace(/[.,!?]/g,"")
    .replace(/\s+/g," ")
    .trim();
}

function levenshtein(a,b){

  const matrix=[];

  for(let i=0;i<=b.length;i++){
    matrix[i]=[i];
  }

  for(let j=0;j<=a.length;j++){
    matrix[0][j]=j;
  }

  for(let i=1;i<=b.length;i++){

    for(let j=1;j<=a.length;j++){

      if(
        b.charAt(i-1) ===
        a.charAt(j-1)
      ){

        matrix[i][j] =
          matrix[i-1][j-1];

      }else{

        matrix[i][j] =
          Math.min(
            matrix[i-1][j-1]+1,
            matrix[i][j-1]+1,
            matrix[i-1][j]+1
          );
      }
    }
  }

  return matrix[b.length][a.length];
}

function calculateSimilarity(a,b){

  a = normalizeEnglish(a);

  b = normalizeEnglish(b);

  const distance =
    levenshtein(a,b);

  const maxLength =
    Math.max(a.length,b.length);

  let similarity =
    Math.round(
      (1-distance/maxLength)*100
    );

  similarity += 10;

  if(similarity > 100){
    similarity = 100;
  }

  return similarity;
}

function getBestScore(spoken){

  let best = 0;

  currentConversation.answers
  .forEach(answer=>{

    const score =
      calculateSimilarity(
        answer,
        spoken
      );

    if(score > best){
      best = score;
    }

  });

  return best;
}

function startRecognition(){

  if(isRecognizing){
    return;
  }

  const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

  if(!SpeechRecognition){

    alert(
      "Safari最新版を使用してください"
    );

    return;
  }

  recognition =
    new SpeechRecognition();

  isRecognizing = true;

  document.getElementById("status")
  .innerText =
    "音声認識中...";

  recognition.lang = "en-US";

  recognition.interimResults = false;

  recognition.continuous = false;

  recognition.maxAlternatives = 1;

  recognition.onresult = function(event){

    const spoken =
      event.results[0][0].transcript;

    const score =
      getBestScore(spoken);

    document.getElementById("result")
    .innerHTML =

`
<b>あなた:</b><br>
${spoken}

<br><br>

<b>模範解答①:</b><br>
${currentConversation.answers[0]}

<br><br>

<b>模範解答②:</b><br>
${currentConversation.answers[1]}

<br><br>

<b>模範解答③:</b><br>
${currentConversation.answers[2]}
`;

    document.getElementById("score")
    .innerText =
      score + "%";

    if(score >= 90){

      document.getElementById("feedback")
      .innerHTML =

`
非常に自然な英語です。<br><br>

英検1級・IELTS高得点レベルです。
`;

    }else if(score >= 75){

      document.getElementById("feedback")
      .innerHTML =

`
かなり自然です。<br><br>

さらにリンキングを意識すると、
よりネイティブらしくなります。
`;

    }else{

      document.getElementById("feedback")
      .innerHTML =

`
理由・具体例・結論を
意識するとさらに良くなります。
`;
    }

  };

  recognition.onerror = function(event){

    document.getElementById("status")
    .innerText =
      "認識エラー";

    console.log(event.error);

    isRecognizing = false;
  };

  recognition.onend = function(){

    isRecognizing = false;

    document.getElementById("status")
    .innerText =
      "待機中";
  };

  recognition.start();
}

loadConversation();

</script>

</body>

</html>
